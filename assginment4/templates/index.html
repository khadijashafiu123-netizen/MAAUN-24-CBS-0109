<!DOCTYPE html>
<html>
<head>
    <title>Business Directory</title>
</head>
<body>

<h1>Local Business Directory</h1>

<a href="/add">Add New Business</a>

<h2>All Businesses</h2>
<ul>
{% for business in businesses %}
<li>{{ business.name }} - {{ business.category }} - {{ business.date_added }}</li>
{% endfor %}
</ul>

<h2>Recently Added</h2>
<ul>
{% for r in recent %}
<li>{{ r.name }}</li>
{% endfor %}
</ul>

</body>
</html>
